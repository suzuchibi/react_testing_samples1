name: Chromatic

on:
  push:
    branches:
      - main

jobs:
  chromatic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npx chromatic --delay=3000 --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}