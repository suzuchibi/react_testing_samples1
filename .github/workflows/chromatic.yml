name: Chromatic

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  chromatic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: frontend/react
      - run: npx chromatic --delay=3000 --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        working-directory: frontend/react